<div class="mb-32" th:fragment="table(data)">
    <div class="tbk-table">
        <div class="table-column tbk-head">Campo</div>
        <div class="table-column tbk-head">Valor</div>

        <th:block th:each="entry : ${data}">
            <div class="table-column" th:text="${entry.key}"></div>
            <div class="table-column" th:text="${entry.value}"></div>
        </th:block>
    </div>
</div>
